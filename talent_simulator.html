<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Last Z – Talent Simulator</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #0D0D0D; color: #eee; min-height: 100vh; }

header { background: #0a0a0a; border-bottom: 1px solid #222; padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.header-top a { color: #00FFFF; text-decoration: none; font-size: 13px; border: 1px solid #00FFFF; padding: 4px 12px; border-radius: 4px; }
.header-top h1 { font-size: 16px; color: #00FFFF; letter-spacing: 2px; text-transform: uppercase; }

.points-bar { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.points-input-wrap { display: flex; align-items: center; gap: 6px; font-size: 13px; color: #aaa; }
.points-input-wrap input { width: 60px; background: #1a1a1a; border: 1px solid #333; color: #FF8C00; font-size: 14px; font-weight: bold; text-align: center; padding: 4px; border-radius: 4px; }
.points-display { font-size: 13px; }
.pts-used { color: #00FFFF; font-weight: bold; }
.pts-avail { font-weight: bold; }
.pts-avail.ok { color: #7fff7f; }
.pts-avail.warn { color: #ff6666; }
.btn-reset { background: #2a1a1a; border: 1px solid #ff4444; color: #ff4444; font-size: 12px; padding: 5px 14px; border-radius: 4px; cursor: pointer; margin-left: auto; }
.btn-reset:hover { background: #ff4444; color: #fff; }

.tree-tabs { display: flex; gap: 0; border-bottom: 1px solid #222; }
.tab { flex: 1; padding: 10px; text-align: center; font-size: 13px; cursor: pointer; color: #ffffff; border-bottom: 2px solid transparent; transition: all 0.2s; letter-spacing: 1px; text-transform: uppercase; }
.tab.active { color: #00FFFF; border-bottom-color: #00FFFF; background: #0f1a1a; }
.tab:hover:not(.active) { color: #fff; }

.tree-container { padding: 12px 8px 32px; max-width: 500px; margin: 0 auto; }
.tier { margin-bottom: 8px; }
.tier-label { font-size: 11px; color: #FF8C00; letter-spacing: 2px; margin-bottom: 6px; padding-left: 4px; }
.tier-nodes { display: flex; gap: 8px; justify-content: center; }
.tier-nodes.single { justify-content: center; }

.node {
  flex: 1; max-width: 200px;
  background: #1a1a1a;
  border: 2px solid #2a2a2a;
  border-radius: 8px;
  padding: 10px 8px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
  user-select: none;
}
.node:hover { border-color: #444; }
.node.has-points { border-color: #FF8C00; background: #1f1a0f; }
.node.maxed { border-color: #00FFFF; background: #0f1f1f; }
.node.locked { opacity: 0.45; cursor: not-allowed; }
.node.prereq-warn { border-color: #ff4444 !important; animation: pulse 0.3s ease; }
@keyframes pulse { 0%{transform:scale(1)} 50%{transform:scale(1.03)} 100%{transform:scale(1)} }

.node-name { font-size: 11px; font-weight: bold; color: #eee; margin-bottom: 4px; line-height: 1.3; min-height: 28px; }
.node-effect { font-size: 10px; color: #888; margin-bottom: 8px; line-height: 1.3; min-height: 24px; }
.node-rank { display: flex; align-items: center; justify-content: space-between; }
.rank-dots { display: flex; gap: 3px; flex-wrap: wrap; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #333; border: 1px solid #444; transition: background 0.1s; }
.dot.filled { background: #FF8C00; border-color: #FF8C00; }
.node.maxed .dot.filled { background: #00FFFF; border-color: #00FFFF; }
.rank-label { font-size: 10px; color: #666; }
.node.has-points .rank-label, .node.maxed .rank-label { color: #FF8C00; }
.node.maxed .rank-label { color: #00FFFF; }

.node-btns { display: flex; gap: 4px; margin-top: 8px; }
.node-btn { flex: 1; font-size: 16px; background: #222; border: 1px solid #333; color: #aaa; border-radius: 4px; cursor: pointer; padding: 2px; line-height: 1; }
.node-btn:hover { background: #333; color: #fff; }
.node-btn:disabled { opacity: 0.3; cursor: not-allowed; }

#prereq-banner {
  display: none;
  position: fixed;
  bottom: 16px; left: 50%; transform: translateX(-50%);
  background: #2a0a0a;
  border: 1px solid #ff4444;
  color: #ff9999;
  font-size: 13px;
  padding: 10px 20px;
  border-radius: 6px;
  z-index: 200;
  text-align: center;
  max-width: 340px;
  box-shadow: 0 4px 16px #ff000033;
}

/* SUMMARY / RECAP */
.recap-section { background: #0f0f0f; border-top: 2px solid #1a1a1a; padding: 20px 16px 40px; max-width: 800px; margin: 0 auto; }
.recap-section h2 { font-size: 13px; color: #00FFFF; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; }

.recap-cols { display: flex; gap: 16px; flex-wrap: wrap; }
.recap-col { flex: 1; min-width: 240px; }
.recap-col h3 { font-size: 11px; color: #FF8C00; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; border-bottom: 1px solid #2a2a2a; padding-bottom: 4px; }

.recap-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; padding: 5px 0; border-bottom: 1px solid #1a1a1a; }
.recap-row .rname { color: #bbb; }
.recap-row .rval { color: #00FFFF; font-weight: bold; font-size: 13px; }
.recap-row .rval.maxed { color: #7fff7f; }
.recap-empty { color: #333; font-size: 12px; font-style: italic; padding: 8px 0; }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <a href="index.html">← Home</a>
    <h1>Talent Simulator</h1>
    <div style="width:70px"></div>
  </div>
  <div class="points-bar">
    <div class="points-input-wrap">
      <span>My Points:</span>
      <input type="number" id="total-points" value="50" min="0" max="200">
    </div>
    <div class="points-display">
      Used: <span class="pts-used" id="pts-used">0</span> &nbsp;|&nbsp;
      Available: <span class="pts-avail ok" id="pts-avail">50</span>
    </div>
    <button class="btn-reset" onclick="resetAll()">↺ Reset</button>
  </div>
</header>

<div class="tree-tabs">
  <div class="tab active" onclick="switchTree('support')">🔧 Support</div>
  <div class="tab" onclick="switchTree('combat')">⚔ Combat</div>
</div>

<div id="tree-support" class="tree-container"></div>
<div id="tree-combat" class="tree-container" style="display:none"></div>

<div class="recap-section">

<div id="prereq-banner"></div>

  combat: {

        { id:'c_conc_power', name:'Concentrated Power',  max:5, effectDesc:'Rally DMG (Self) +2% per rank',

      ]},
      { lv:35, prereq:15, nodes:[
        { id:'c_recall',     name:'Instant Recall',       max:2, effectDesc:'Instantly recall one troop — usable +1 time daily per rank',
          bonus:{ type:'flat', stat:'Instant Recall (daily)', perRank:1, unit:'x/day' } },
        { id:'c_first_aid',  name:'First Aid Expert',     max:5, effectDesc:'Healing Speed +5% per rank',
          bonus:{ type:'pct', stat:'Healing Speed', perRank:5, unit:'%' } },
      ]},
      { lv:40, prereq:20, nodes:[
        { id:'c_glorious',   name:'Glorious Commander',   max:5, effectDesc:'Troop DMG during Clash for Glory +2% per rank',
          bonus:{ type:'pct', stat:'Troop DMG (Clash for Glory)', perRank:2, unit:'%' } },
        { id:'c_again',      name:'Again!',               max:5, effectDesc:'Troop Return Speed +5% per rank',
          bonus:{ type:'pct', stat:'Troop Return Speed', perRank:5, unit:'%' } },
      ]},
      { lv:45, prereq:20, nodes:[
        { id:'c_holdline',   name:'Hold The Line',        max:5, effectDesc:'Troop ATK & DEF when defending HQ +2% per rank',
          bonus:{ type:'pct', stat:'Troop ATK & DEF (Defense)', perRank:2, unit:'%' } },
        { id:'c_def_works',  name:'Defensive Works',      max:1, effectDesc:'Build 1 extra defensive structure',
          bonus:{ type:'flat', stat:'Extra Defensive Structures', perRank:1, unit:'' } },
      ]},
      { lv:50, prereq:25, single:true, nodes:[
        { id:'c_cog_boost',  name:'Cognitive Boost',      max:5, effectDesc:'Assign up to 5 pts to Support tree',
          bonus:{ type:'active', stat:'Cognitive Boost', perRank:1, unit:'', desc:'Assign 5 Mastery Points to Support tree' } },

};

// ─── STATE ───────────────────────────────────────────────────────────────────
const state = {};
Object.values(TREES).forEach(tree => tree.tiers.forEach(tier => tier.nodes.forEach(n => state[n.id] = 0)));

let currentTree = 'support';
let bannerTimeout = null;

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function totalPoints() { return parseInt(document.getElementById('total-points').value) || 0; }
function usedPoints() { return Object.values(state).reduce((a,b) => a+b, 0); }

function getPrereq(treeKey, tier) {
  // per-node prereq (only Siege Expert in support lv5)
  // tier-level prereq
  return typeof tier.prereq === 'number' ? tier.prereq : 0;
}

function getNodePrereq(node) {
  return typeof node.prereq === 'number' ? node.prereq : 0;
}

function pointsSpentBefore(treeKey, lv) {
  return TREES[treeKey].tiers
    .filter(t => t.lv < lv)
    .reduce((sum, t) => sum + t.nodes.reduce((s, n) => s + (state[n.id]||0), 0), 0);
}

function tierUnlocked(treeKey, lv, tierPrereq) {
  if (!tierPrereq) return true;
  return pointsSpentBefore(treeKey, lv) >= tierPrereq;
}

function nodeUnlocked(treeKey, lv, tierPrereq, nodePrereq) {
  if (!tierUnlocked(treeKey, lv, tierPrereq)) return false;
  if (!nodePrereq) return true;
  return pointsSpentBefore(treeKey, lv) >= nodePrereq;
}

// ─── RENDER TREE ─────────────────────────────────────────────────────────────
function renderTree(treeKey) {
  const tree = TREES[treeKey];
  const container = document.getElementById('tree-' + treeKey);
  container.innerHTML = '';

  tree.tiers.forEach(tier => {
    const tierPrereq = getPrereq(treeKey, tier);
    const tierDiv = document.createElement('div');
    tierDiv.className = 'tier';

    const label = document.createElement('div');
    label.className = 'tier-label';
    label.textContent = `MASTERY LV.${tier.lv}` + (tierPrereq ? `  ·  ${tierPrereq} pts required` : '');
    tierDiv.appendChild(label);

    const nodesDiv = document.createElement('div');
    nodesDiv.className = 'tier-nodes' + (tier.single ? ' single' : '');

    tier.nodes.forEach(nodeData => {
      const nodePrereq = getNodePrereq(nodeData);
      const unlocked = nodeUnlocked(treeKey, tier.lv, tierPrereq, nodePrereq);
      nodesDiv.appendChild(buildNode(treeKey, tier.lv, tierPrereq, nodeData, unlocked));
    });

    tierDiv.appendChild(nodesDiv);
    container.appendChild(tierDiv);
  });

  renderRecap();
  updatePointsBar();
}

function buildNode(treeKey, lv, tierPrereq, nodeData, unlocked) {
  const rank = state[nodeData.id] || 0;
  const isMax = rank >= nodeData.max;
  const hasPoints = rank > 0;
  const nodePrereq = getNodePrereq(nodeData);

  const node = document.createElement('div');
  node.className = 'node'
    + (isMax ? ' maxed' : hasPoints ? ' has-points' : '')
    + (!unlocked ? ' locked' : '');
  node.id = 'node-' + nodeData.id;

  let dots = '';
  for (let i = 0; i < nodeData.max; i++) {
    dots += `<div class="dot ${i < rank ? 'filled' : ''}"></div>`;
  }

  const prereqNote = nodePrereq ? `<div style="font-size:9px;color:#ff8844;margin-bottom:3px">Req: ${nodePrereq} pts spent</div>` : '';

  node.innerHTML = `
    <div class="node-name">${nodeData.name}</div>
    ${prereqNote}
    <div class="node-effect">${nodeData.effectDesc}</div>
    <div class="node-rank">
      <div class="rank-dots">${dots}</div>
      <div class="rank-label">${rank}/${nodeData.max}</div>
    </div>
    <div class="node-btns">
      <button class="node-btn" onclick="adjustNode('${treeKey}',${lv},${tierPrereq},'${nodeData.id}',${nodeData.max},${nodePrereq},-1)" ${rank===0?'disabled':''}>−</button>
      <button class="node-btn" onclick="adjustNode('${treeKey}',${lv},${tierPrereq},'${nodeData.id}',${nodeData.max},${nodePrereq},+1)" ${isMax?'disabled':''}>+</button>
    </div>
  `;
  return node;
}

function adjustNode(treeKey, lv, tierPrereq, nodeId, maxRank, nodePrereq, delta) {
  if (delta > 0) {
    if (!nodeUnlocked(treeKey, lv, tierPrereq, nodePrereq)) {
      const needed = nodePrereq || tierPrereq;
      showBanner(`⚠ Requires ${needed} points spent in prior tiers`);
      flashNode(nodeId);
      return;
    }
    if (totalPoints() - usedPoints() <= 0) {
      showBanner(`⚠ No points available — increase your total or reset some talents`);
      return;
    }
  }
  const cur = state[nodeId] || 0;
  const next = Math.max(0, Math.min(maxRank, cur + delta));
  if (next === cur) return;
  state[nodeId] = next;
  renderTree('combat');
  renderTree('support');
  if (currentTree === 'combat') { document.getElementById('tree-combat').style.display=''; document.getElementById('tree-support').style.display='none'; }
  else { document.getElementById('tree-support').style.display=''; document.getElementById('tree-combat').style.display='none'; }
}

function flashNode(nodeId) {
  const el = document.getElementById('node-' + nodeId);
  if (!el) return;
  el.classList.add('prereq-warn');
  setTimeout(() => el.classList.remove('prereq-warn'), 400);
}

function showBanner(msg) {
  const b = document.getElementById('prereq-banner');
  b.textContent = msg;
  b.style.display = 'block';
  if (bannerTimeout) clearTimeout(bannerTimeout);
  bannerTimeout = setTimeout(() => b.style.display = 'none', 3000);
}

function updatePointsBar() {
  const used = usedPoints();
  const total = totalPoints();
  const avail = total - used;
  document.getElementById('pts-used').textContent = used;
  const el = document.getElementById('pts-avail');
  el.textContent = avail;
  el.className = 'pts-avail ' + (avail < 0 ? 'warn' : 'ok');
}

// ─── RECAP ───────────────────────────────────────────────────────────────────
function renderRecap() {
  const pctMap = {};   // stat -> total value
  const otherArr = []; // { stat, value, unit, desc }

  Object.values(TREES).forEach(tree => {
    tree.tiers.forEach(tier => {
      tier.nodes.forEach(n => {
        const rank = state[n.id] || 0;
        if (!rank) return;
        const b = n.bonus;
        const total = b.perRank * rank;
        if (b.type === 'pct') {
          pctMap[b.stat] = (pctMap[b.stat] || 0) + total;
        } else {
          // flat or active
          const existing = otherArr.find(x => x.stat === b.stat);
          if (existing) { existing.value += total; }
          else otherArr.push({ stat: b.stat, value: total, unit: b.unit, desc: b.desc || null, type: b.type });
        }
      });
    });
  });

  // PCT column
  const pctEl = document.getElementById('recap-pct');
  const pctEntries = Object.entries(pctMap);
  if (!pctEntries.length) {
    pctEl.innerHTML = '<div class="recap-empty">No % bonuses yet</div>';
  } else {
    pctEl.innerHTML = pctEntries.sort((a,b) => Math.abs(b[1]) - Math.abs(a[1])).map(([stat, val]) => {
      const isMax = false;
      const sign = val > 0 ? '+' : '';
      return `<div class="recap-row"><span class="rname">${stat}</span><span class="rval">${sign}${val}%</span></div>`;
    }).join('');
  }

  // OTHER column
  const otherEl = document.getElementById('recap-other');
  if (!otherArr.length) {
    otherEl.innerHTML = '<div class="recap-empty">No other bonuses yet</div>';
  } else {
    otherEl.innerHTML = otherArr.map(item => {
      const display = item.desc
        ? `<span class="rname" style="font-size:11px">${item.stat}</span><span class="rval" style="font-size:11px;color:#aaa">${item.desc}</span>`
        : `<span class="rname">${item.stat}</span><span class="rval">${item.value > 0 ? '+' : ''}${item.value}${item.unit}</span>`;
      return `<div class="recap-row" style="${item.desc?'flex-direction:column;gap:2px;align-items:flex-start':''}">${display}</div>`;
    }).join('');
  }
}

function switchTree(treeKey) {
  currentTree = treeKey;
  document.getElementById('tree-support').style.display = treeKey === 'support' ? '' : 'none';
  document.getElementById('tree-combat').style.display = treeKey === 'combat' ? '' : 'none';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0 && treeKey === 'support') || (i === 1 && treeKey === 'combat'));
  });
}

function resetAll() {
  Object.keys(state).forEach(k => state[k] = 0);
  renderTree('combat');
  renderTree('support');
  switchTree(currentTree);
}

document.getElementById('total-points').addEventListener('input', () => {
  renderTree('combat');
  renderTree('support');
  switchTree(currentTree);
});

// INIT
renderTree('combat');
renderTree('support');
switchTree('support');
</script>
</body>
